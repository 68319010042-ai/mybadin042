name: Deploy to GitHub Pages

# 💥 จุดสำคัญอยู่ตรงนี้: บอกให้บอทรันงานทันทีที่มีการ push โค้ดใหม่เข้ามา
on:
  push:
    branches:
      - main  # ถ้าปกติคุณกดแก้โค้ดใน branch main ตรงนี้ต้องเป็น main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . 
          branch: gh-pages 
